name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded PR runs to save minutes, but NEVER cancel a push-to-main run
# mid-flight — that job migrates the DB and deploys, and interrupting it could
# leave a partial deploy. So cancel-in-progress is scoped to pull_request only.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, unit/integration tests
    runs-on: ubuntu-latest
    # Ephemeral Postgres + S3Mock for this job only — separate from any real
    # Neon project / AWS bucket. Payload's dev-mode schema push runs against
    # Postgres on boot; the media upload/delete integration test
    # (tests/int/media.int.spec.ts) runs against S3Mock. S3Mock, not MinIO or
    # LocalStack — both discontinued free/CE container images (Oct 2025 /
    # Mar 2026) — see docs/PROGRESS.md for the research trail.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: bulbau
          POSTGRES_PASSWORD: bulbau_ci
          POSTGRES_DB: bulbau
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      s3mock:
        image: adobe/s3mock:5.1.0
        env:
          COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: bulbau-ci-test
        ports:
          - 9090:9090
        options: >-
          --health-cmd "wget --spider -q http://localhost:9090/favicon.ico"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://bulbau:bulbau_ci@localhost:5432/bulbau
      PAYLOAD_SECRET: ci-only-secret-not-for-production
      # 2FA (TOTP) secret encryption + step-up cookie signing — see
      # src/lib/totp/keys.ts. CI-only value, unrelated to any real secret.
      # No UPSTASH_REDIS_REST_URL/TOKEN here deliberately: absent, the rate
      # limiter (src/lib/totp/rateLimit.ts) falls back to an in-memory
      # limiter, which is exactly the right behavior for CI (same pattern as
      # S3Mock standing in for real S3, below) — real Upstash credentials are
      # only required in staging/production.
      TOTP_ENCRYPTION_KEY: Y2ktb25seS10b3RwLWtleS1ub3QtZm9yLXByb2R1Y3Rpb24tMzJieXRlcyE=
      S3_BUCKET: bulbau-ci-test
      S3_ENDPOINT: http://localhost:9090
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
    steps:
      # Pinned to a full commit SHA (supply-chain hardening — a mutable tag could
      # be repointed by a compromised maintainer, and this workflow can assume the
      # AWS deploy role via OIDC). Dependabot (github-actions ecosystem) keeps the
      # SHA current and updates the version comment.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Don't leave the GITHUB_TOKEN in .git/config after checkout — no step
          # here pushes back to the repo, so the credential is never needed.
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Dependency audit (fails on high/critical only)
        run: npm audit --audit-level=high

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:int

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run build

      # Lighthouse CI (TECHSPEC §6.11 / §7B) — the perf/SEO/best-practices
      # counterpart to the axe gate in the e2e suite below. Audits a PRODUCTION
      # build (`lhci` boots `npm run start` against the `next build` from the step
      # above and the CI Postgres), asserting the budgets in lighthouserc.cjs.
      # Accessibility / SEO / best-practices are hard gates; performance currently
      # WARNs until its first CI baseline is observed and the threshold calibrated
      # (see the config for the full rationale). Chrome is preinstalled on
      # ubuntu-latest, so chrome-launcher finds it with no extra step.
      #
      # ORDER MATTERS: this runs BEFORE test:e2e. The e2e step's Playwright
      # webServer is `next dev`, which overwrites the `.next` production build in
      # place — a later `next start` would then fail with "no production build".
      # So Lighthouse (needs the production build) goes first; the dev server can
      # clobber `.next` afterwards. Payload's schema already exists on the CI
      # Postgres from the earlier `test:int` boot (push-on), so pages render.
      - name: Lighthouse CI (performance / SEO / a11y budgets)
        run: npm run lhci

      # Runs the full Playwright suite, which now INCLUDES the axe-core WCAG 2.2
      # AA accessibility gate (tests/e2e/accessibility.e2e.spec.ts) — a failing
      # serious/critical violation fails this step, with the offending rule +
      # element selectors printed in the test output.
      - run: npm run test:e2e

  deploy-staging:
    name: Deploy to staging
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write # required for AWS OIDC — no stored AWS keys
      contents: read
    steps:
      # Pinned to a full commit SHA (supply-chain hardening — a mutable tag could
      # be repointed by a compromised maintainer, and this workflow can assume the
      # AWS deploy role via OIDC). Dependabot (github-actions ecosystem) keeps the
      # SHA current and updates the version comment.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Don't leave the GITHUB_TOKEN in .git/config after checkout — no step
          # here pushes back to the repo, so the credential is never needed.
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      - run: npm ci --legacy-peer-deps

      # Apply tracked DB migrations to staging BEFORE deploying the new code, so
      # the schema is never older than the code that will run against it. Payload
      # on Lambda runs with push OFF, so a deploy alone never creates/updates
      # tables — this step is what does. If it fails, the job stops here and no
      # code is deployed (a bad migration can't reach a live app).
      #
      #   • DATABASE_URL is the DIRECT (unpooled) Neon URL — DDL must NOT go
      #     through Neon's PgBouncer pooler (transaction pooling breaks schema
      #     changes). This is a different value from the app's runtime DatabaseUrl
      #     SST secret (which is the -pooler URL). Store it as the staging
      #     Environment secret STAGING_DATABASE_URL_UNPOOLED.
      #   • NODE_ENV=production forces Drizzle `push` off so ONLY migrations touch
      #     the schema (see src/payload.config.ts).
      #   • PAYLOAD_SECRET only has to be non-empty here: `payload migrate` does
      #     DDL, not token signing. It intentionally does not reuse the app's real
      #     secret (kept as the single-source SST secret), avoiding secret sprawl.
      - name: Run database migrations (staging)
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error title=Staging DB URL missing::STAGING_DATABASE_URL_UNPOOLED is not set on the 'staging' GitHub Environment. Set it to the staging Neon branch's DIRECT (unpooled, no '-pooler' in the host) connection string, then re-run. One-time cutover runbook: docs/PROGRESS.md → 'Immediate next steps'. (An empty URL makes pg fall back to localhost:5432 — the ECONNREFUSED you may have just seen.)"
            exit 1
          fi
          npm run migrate
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL_UNPOOLED }}
          PAYLOAD_SECRET: migrate-only-no-token-ops

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - run: npx sst deploy --stage staging
        env:
          CI: true
          # Build-time static generation (ISR) reads published CMS content so the
          # deployed public pages ship populated, not empty-until-first-revalidate.
          # Uses the staging DIRECT/unpooled URL (same secret as the migrate step);
          # the Lambda's RUNTIME DATABASE_URL is the pooled SST secret set in
          # sst.config.ts and is unaffected by this build-only value. Reads are
          # resilient (src/lib/content.ts) so a cold/empty DB still builds.
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL_UNPOOLED }}

  # TODO (once staging is verified stable, Phase 2+): a `deploy-production`
  # job gated on a GitHub Environment manual approval, running the SAME
  # "Run database migrations" step first (against the production DIRECT/unpooled
  # URL) and then `sst deploy --stage production`. Production must be
  # migrations-only — never push. Deliberately not added yet so an empty
  # placeholder gate doesn't create a false sense of coverage.
